name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://pm:pm@localhost:5432/pm?schema=public
  REDIS_URL: redis://localhost:6379
  JWT_ACCESS_SECRET: ci-access-secret-ci-access-secret
  JWT_REFRESH_SECRET: ci-refresh-secret-ci-refresh-secret

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pm
          POSTGRES_PASSWORD: pm
          POSTGRES_DB: pm
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U pm"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    steps:
      - uses: actions/checkout@v4

      # No `version:` here on purpose — action-setup reads it from the
      # `packageManager` field in package.json (pnpm@11.9.0), so the version
      # is declared in exactly one place. Pinning it here too errors with
      # "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Apply migrations (check)
        run: pnpm --filter @pm/db migrate:deploy

      - name: Build
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: build-test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pm
          POSTGRES_PASSWORD: pm
          POSTGRES_DB: pm
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U pm"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: http://localhost:4000

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Migrate + seed
        run: |
          pnpm --filter @pm/db migrate:deploy
          pnpm db:seed

      - name: Build
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm --filter @pm/web exec playwright install --with-deps chromium

      - name: Start API
        run: |
          node apps/api/dist/main.js &
          npx wait-on http://localhost:4000/health --timeout 60000

      - name: Run e2e
        run: pnpm --filter @pm/web test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
